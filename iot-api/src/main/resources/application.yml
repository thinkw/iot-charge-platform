server:
  port: 8080

spring:
  application:
    name: iot-api

  datasource:
    url: jdbc:mysql://localhost:3306/iot_charge_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

logging:
  level:
    com.iot: INFO                          # 全局默认 INFO，关掉所有 DEBUG
    com.iot.core.service.impl: DEBUG       # 核心业务保留 DEBUG（充电/设备/订单）
    io.netty: WARN                         # Netty 降噪
    org.eclipse.paho: WARN                 # MQTT 客户端 SDK
    org.apache.rocketmq: WARN              # RocketMQ 客户端 SDK

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.iot.core.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: iot-charge-producer

# JWT 配置
jwt:
  secret: iot-charge-platform-secret-keyiot-charge-platform-secret-key
  expiration: 86400000

# MQTT Server 配置
mqtt:
  server:
    port: 1883 # MQTT 监听端口
    boss-thread-count: 2 # Boss 线程数（接收连接）
    worker-thread-count: 8 # Worker 线程数（处理 I/O）
    idle-read-timeout-seconds: 90 # 读空闲超时（秒）
    so-backlog: 1024 # 连接等待队列长度
    max-connections: 100 # 最大连接数
    # 出站缓冲区水位控制
    write-buffer:
      low-watermark-bytes: 32768 # 出站低水位 32KB，低于此值恢复可写
      high-watermark-bytes: 65536 # 出站高水位 64KB，超过此值暂停写入
    # 直接内存保护
    memory-protect:
      high-watermark: 0.9 # 暂停 autoRead 阈值
      low-watermark: 0.6 # 恢复 autoRead 阈值
      check-interval-cron: "*/10 * * * * *" # 检查间隔（cron 表达式）
    # 慢客户端保护
    slow-client:
      max-non-writable-seconds: 30 # 持续不可写超时阈值（秒），超时主动断连
      check-interval-cron: "*/10 * * * * *" # 检查间隔（cron 表达式）

  # 指令下发可靠性配置
  command:
    sync-timeout-ms: 3000      # 同步等待超时（毫秒），混合模式中 HTTP 线程最大阻塞时间
    total-timeout-ms: 10000    # 总超时时间（毫秒），超时未响应则取消订单
    max-retries: 2             # 最大重试次数（不含首次发送）
    retry-interval-ms: 2000    # 重试间隔（毫秒）
    scan-interval-ms: 5000     # 定时扫描间隔（毫秒）

# 设备离线与订单对账配置
device:
  offline:
    heartbeat-timeout-seconds: 30      # 心跳超时阈值（90秒），超过此时间未收到心跳则认为设备离线
    heartbeat-scan-interval-ms: 10000  # 心跳超时扫描间隔（30000毫秒）
    terminate-delay-seconds: 40       # 离线后终止订单延迟（120秒），防网络抖动导致误终止
    recovery-grace-seconds: 60         # 设备恢复后等待状态上报宽限期（60秒）
    orphan-scan-interval-ms: 28000     # 孤儿订单扫描间隔（60000毫秒），兜底任务扫描频率
    service-fee-discount: 0.5          # 异常终止时服务费折扣率（0.0~1.0），0.5 表示五折
