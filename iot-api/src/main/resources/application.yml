server:
  port: 8080

spring:
  application:
    name: iot-api

  datasource:
    url: jdbc:mysql://localhost:3306/iot_charge_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.iot.core.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: iot-charge-producer

# JWT 配置
jwt:
  secret: iot-charge-platform-secret-keyiot-charge-platform-secret-key
  expiration: 86400000
